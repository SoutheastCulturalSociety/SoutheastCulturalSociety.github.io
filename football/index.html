<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Football Squad Board</title>

<link rel="icon" type="image/png" href="https://southeastculturalsociety.github.io/assets/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:
    radial-gradient(circle at top,#0b2a17 0%,#031108 55%);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

/* LOADER */

.loader{
    position:fixed;
    inset:0;
    background:#031108;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    transition:0.5s;
}

.loader-ball{
    width:95px;
    height:95px;
    border-radius:50%;
    border:5px solid rgba(255,255,255,0.08);
    border-top:5px solid #00ff88;
    animation:spin 1s linear infinite;
    margin-bottom:25px;
}

.loader h1{
    color:#00ff88;
    font-size:30px;
    margin-bottom:10px;
}

.loader p{
    opacity:0.8;
    letter-spacing:2px;
    font-size:14px;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

/* MAIN */

.main{
    min-height:100vh;
    padding:14px;
    display:flex;
    flex-direction:column;
}

/* TOP */

.top-section{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:16px;
}

/* LOGO */

.logo-box{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-box img{
    width:58px;
    height:58px;
    object-fit:contain;
    filter:drop-shadow(0 0 10px rgba(0,255,120,0.25));
}

.logo-text h1{
    font-size:24px;
    color:#00ff88;
    line-height:1;
}

.logo-text p{
    font-size:12px;
    opacity:0.75;
    margin-top:4px;
}

/* DESKTOP LAYOUT */

.game-layout{
    width:100%;
    max-width:1500px;
    margin:auto;
    display:grid;
    grid-template-columns:260px minmax(300px,500px) 260px;
    gap:18px;
    align-items:start;
}

/* PANELS */

.side-panel{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:18px;
    backdrop-filter:blur(10px);
    box-shadow:
    0 0 25px rgba(0,255,120,0.05),
    inset 0 0 15px rgba(255,255,255,0.03);
}

.side-title{
    color:#00ff88;
    font-size:18px;
    margin-bottom:14px;
    text-align:center;
}

/* REFEREE */

.referee-panel{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
}

.ref-icon{
    font-size:42px;
}

.referee-panel h2{
    font-size:20px;
    color:#00ff88;
}

.referee-panel p{
    font-size:12px;
    opacity:0.75;
}

/* CARDS */

.cards-side{
    display:flex;
    gap:14px;
    justify-content:center;
}

.card{
    width:62px;
    height:90px;
    border-radius:16px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    box-shadow:
    0 0 20px rgba(255,255,255,0.12),
    inset 0 0 10px rgba(255,255,255,0.15);
}

.yellow{
    background:#ffd60a;
}

.red{
    background:#ff2d2d;
}

/* LIST */

.assign-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.assign-item label{
    display:block;
    margin-bottom:5px;
    font-size:12px;
    font-weight:600;
}

.assign-item select{
    width:100%;
    padding:11px;
    border:none;
    border-radius:14px;
    outline:none;
    font-size:12px;
    font-weight:600;
    background:white;
    color:black;
}

.locked{
    background:#d1ffd1 !important;
    border:3px solid lime !important;
    color:#000;
    pointer-events:none;
    cursor:not-allowed;
}

/* FIELD */

.field-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
}

.field{
    position:relative;
    width:min(90vw,500px);
    aspect-ratio:68/105;
    background:#15803d;
    border:5px solid white;
    border-radius:26px;
    overflow:hidden;
    box-shadow:
    0 0 35px rgba(0,255,120,0.18),
    inset 0 0 55px rgba(255,255,255,0.04);
}

.field::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 38px,
        transparent 38px,
        transparent 76px
    );
}

/* FIELD MARKINGS */

.middle-line{
    position:absolute;
    width:3px;
    height:100%;
    background:white;
    left:50%;
    transform:translateX(-50%);
}

.center-circle{
    position:absolute;
    width:120px;
    height:120px;
    border:3px solid white;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

.center-dot{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    background:white;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

.penalty-top{
    position:absolute;
    width:200px;
    height:85px;
    border:3px solid white;
    left:50%;
    transform:translateX(-50%);
    top:0;
}

.penalty-bottom{
    position:absolute;
    width:200px;
    height:85px;
    border:3px solid white;
    left:50%;
    transform:translateX(-50%);
    bottom:0;
}

/* POSITIONS */

.position{
    position:absolute;
    width:100px;
    text-align:center;
    z-index:2;
}

.position label{
    display:block;
    margin-bottom:6px;
    font-size:10px;
    font-weight:600;
    text-shadow:0 0 10px rgba(0,0,0,0.5);
}

.position select{
    width:100%;
    padding:8px;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:10px;
    font-weight:600;
}

/* 11 POSITIONS */
/* STRIKER TOP */

.st{ top:8px; left:50%; transform:translateX(-50%); }

.lw{ top:16%; left:5%; }

.rw{ top:16%; right:5%; }

.cam{ top:29%; left:50%; transform:translateX(-50%); }

.lm{ top:44%; left:7%; }

.rm{ top:44%; right:7%; }

.cm{ top:50%; left:50%; transform:translate(-50%,-50%); }

.lb{ bottom:23%; left:5%; }

.cb{ bottom:23%; left:50%; transform:translateX(-50%); }

.rb{ bottom:23%; right:5%; }

/* GOALKEEPER BOTTOM */

.gk{ bottom:10px; left:50%; transform:translateX(-50%); }

/* MODAL */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.72);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-box{
    width:320px;
    background:white;
    color:black;
    padding:24px;
    border-radius:22px;
}

.modal-box h2{
    margin-bottom:15px;
    font-size:22px;
}

.modal-box input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:14px;
    margin-bottom:15px;
    font-size:15px;
}

.modal-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:14px;
    background:#00b85c;
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

    body{
        overflow-y:auto;
    }

    .game-layout{
        grid-template-columns:1fr;
        gap:16px;
    }

    .field{
        width:min(96vw,430px);
    }

    .position{
        width:82px;
    }

    .position label{
        font-size:8px;
    }

    .position select{
        font-size:8px;
        padding:6px;
    }

    .center-circle{
        width:90px;
        height:90px;
    }

    .penalty-top,
    .penalty-bottom{
        width:140px;
        height:60px;
    }

    .referee-panel{
        justify-content:center;
    }

    .cards-side{
        margin-top:12px;
    }

    .card{
        width:48px;
        height:70px;
        font-size:26px;
    }

    .side-panel{
        width:100%;
    }
}
</style>
</head>

<body>

<!-- LOADER -->

<div class="loader" id="loader">
<div class="loader-ball"></div>
<h1 id="favoritePosition">Striker</h1>
<p>SCS IT Department</p>
</div>

<div class="main">

<!-- TOP -->

<div class="top-section">
<div class="logo-box">
<img src="https://southeastculturalsociety.github.io/assets/logo.png">

<div class="logo-text">
<h1>Football Squad Board</h1>
<p>Southeast Cultural Society</p>
</div>

</div>
</div>

<!-- MAIN GRID -->

<div class="game-layout">

<!-- LEFT SIDE -->

<div>

<div class="side-panel">

<div class="referee-panel">
<div class="ref-icon">⚽</div>

<div>
<h2>Referee</h2>
<p>Official Match Control</p>
</div>
</div>

<div class="cards-side">
<div class="card yellow">🟨</div>
<div class="card red">🟥</div>
</div>

</div>

<!-- BENCH -->

<div class="side-panel" style="margin-top:18px;">

<div class="assign-list">

<div class="assign-item">
<label>Bench Player 1</label>
<select class="bench-select" data-position="Bench Player 1"></select>
</div>

<div class="assign-item">

</div>

<div class="assign-item">
<label>Bench Player 3</label>
<select class="bench-select" data-position="Bench Player 3"></select>
</div>

<div class="assign-item">
<label>Bench Player 4</label>
<select class="bench-select" data-position="Bench Player 4"></select>
</div>

<div class="assign-item">
<label>Bench Player 5</label>
<select class="bench-select" data-position="Bench Player 5"></select>
</div>

</div>

</div>

</div>

<!-- FIELD -->

<div class="field-wrapper">

<div class="field">

<div class="middle-line"></div>
<div class="center-circle"></div>

<div class="position cm">

<select class="player-select" data-position="Center Mid"></select>

</div>

<div class="assign-item">

<select class="cheer-select" data-position="Cheer Leader 3"></select>
</div>

<div class="assign-item">
<label>Cheer Leader 4</label>
<select class="cheer-select" data-position="Cheer Leader 4"></select>
</div>

<div class="assign-item">
<label>Cheer Leader 5</label>
<select class="cheer-select" data-position="Cheer Leader 5"></select>
</div>

<div class="assign-item">
<label>Cheer Leader 6</label>
<select class="cheer-select" data-position="Cheer Leader 6"></select>
</div>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<h2>Player Verification</h2>

<input type="text" id="studentIdInput" placeholder="Enter Student ID" />

<button id="verifyBtn">Verify Player</button>

</div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwRnYn8yRSJmM0um5UebQbCaGgbHci_2Hny_mpqhzFh_V6e6aFdili5BiYFufoEcS8U/exec";

const loader = document.getElementById("loader");
const favoritePosition = document.getElementById("favoritePosition");

const rotatingPositions = [
"Striker",
"Center Mid",
"Right Wing",
"Left Wing",
"Center Back",
"Right Back",
"Left Back",
"Goalkeeper"
];

let loaderIndex = 0;

setInterval(() => {

favoritePosition.innerText = rotatingPositions[loaderIndex];

loaderIndex++;

if(loaderIndex >= rotatingPositions.length){
loaderIndex = 0;
}

},700);

function hideLoader(){

loader.style.opacity = "0";

setTimeout(() => {
loader.style.display = "none";
},500);

}

const selects = document.querySelectorAll("select");

const modal = document.getElementById("modal");

const verifyBtn = document.getElementById("verifyBtn");

const studentIdInput = document.getElementById("studentIdInput");

let players = [];

let currentSelect = null;

/* STORE USED PLAYERS */

let assignedPlayers = new Set();

/* LOAD PLAYERS */

async function loadPlayers(){

try{

const response = await fetch(WEB_APP_URL);

const data = await response.json();

players = data.players || data;

/* EXISTING ASSIGNMENTS */

const assignments = data.assignments || [];

selects.forEach(select => {

select.innerHTML = `<option value="">Select Player</option>`;

players.forEach(player => {

select.innerHTML += `
<option value="${player.name}">
${player.name}
</option>
`;

});

});

/* PRINT EXISTING ASSIGNMENTS */

assignments.forEach(item => {

const select = document.querySelector(
`select[data-position="${item.position}"]`
);

if(select){

select.value = item.player;

select.classList.add("locked");

select.disabled = true;

assignedPlayers.add(item.player);

}

});

}
catch(error){

console.error(error);

alert("Failed to load players");

}
finally{

setTimeout(() => {
hideLoader();
},500);

}

}

/* PAGE LOAD */

window.addEventListener("load", async () => {

await loadPlayers();

});

/* CHANGE EVENT */

selects.forEach(select => {

select.addEventListener("change", () => {

if(!select.value) return;

const selectedPlayer = select.value;

/* PREVENT MULTIPLE ASSIGN */

if(assignedPlayers.has(selectedPlayer)){

alert("This player is already assigned.");

select.value = "";

return;

}

currentSelect = select;

studentIdInput.value = "";

modal.style.display = "flex";

});

});

/* VERIFY */

verifyBtn.addEventListener("click", async () => {

const selectedPlayer = currentSelect.value;

const enteredId = studentIdInput.value;

const found = players.find(
p => p.name === selectedPlayer && p.studentId == enteredId
);

if(found){

assignedPlayers.add(selectedPlayer);

currentSelect.classList.add("locked");

currentSelect.disabled = true;

modal.style.display = "none";

/* SHOW LOADER */

loader.style.display = "flex";
loader.style.opacity = "1";

favoritePosition.innerText =
currentSelect.dataset.position;

await fetch(WEB_APP_URL, {

method:"POST",

body:JSON.stringify({

position:currentSelect.dataset.position,

player:selectedPlayer,

studentId:enteredId

})

});

hideLoader();

alert("Player Assigned Successfully");

}
else{

alert("Invalid Student ID");

}

});

</script>

</body>
</html>
