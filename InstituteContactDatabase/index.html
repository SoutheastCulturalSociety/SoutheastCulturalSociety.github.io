<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Collection</title>

<link rel="icon" type="image/png" href="../assets/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">

<style>

/* ================= LOADER ================= */
#pageLoader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#800000,#4d0000);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
color:white;
font-family:'Poppins',sans-serif;
}

.loaderSpinner{
width:60px;
height:60px;
border:5px solid rgba(255,255,255,0.2);
border-top:5px solid #ffd700;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* ================= EXISTING STYLE ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#fff1e6,#f5e0dc);
color:#4d1a00;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
background:rgba(128,0,0,0.85);
color:white;
padding:1rem;
text-align:center;
}

header img.logo{
width:90px;
display:block;
margin:0 auto 10px;
}

header h1{
font-size:2rem;
margin-bottom:5px;
}

header p{
font-weight:500;
margin-bottom:10px;
}

nav a{
color:#ffd700;
margin:0 12px;
text-decoration:none;
font-weight:600;
}

nav a:hover{
text-decoration:underline;
}

main{
flex:1;
padding:30px 15px;
}

.container{
max-width:720px;
margin:auto;
background:white;
overflow:visible;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
position:relative;
z-index:1;
}

.title{
background:maroon;
color:white;
padding:18px;
font-size:22px;
font-weight:600;
text-align:center;
}

.form-area{
padding:25px;
}

.field{
margin-bottom:18px;
position:relative;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,
select{
width:100%;
padding:12px 14px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;
}

.hidden{
display:none !important;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:maroon;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
opacity:.92;
}

.message{
margin-top:18px;
padding:18px;
border-radius:10px;
font-weight:600;
text-align:center;
}

.success{
background:#d4edda;
color:#155724;
}

.error{
background:#f8d7da;
color:#721c24;
}

footer{
background:#8b0000;
color:#fffaf0;
text-align:center;
padding:15px 0;
font-size:0.95rem;
margin-top:auto;
}

.ts-dropdown{
max-height:220px !important;
overflow-y:auto !important;
z-index:999999 !important;
}

.ts-control{
min-height:44px;
}

</style>
</head>

<body>

<div id="pageLoader">
<div class="loaderSpinner"></div>
<h2>SCS IT DEPARTMENT</h2>
<p>Loading System...</p>
</div>

<header>
<img src="../assets/logo.png" class="logo">
<h1>Southeast Cultural Society</h1>
<p>Since 2010</p>

<nav>
<a href="#">Contact Collection</a>
<a href="https://southeastculturalsociety.github.io" target="_blank">Home</a>
</nav>
</header>

<main>

<div class="container">
<div class="title">National Cultural Fest Contact Collection</div>

<div class="form-area">

<form id="contactForm">

<div id="formBox">

<div class="field">
<label>Your Name</label>
<select id="member" required></select>
</div>

<div class="field" id="universityWrapper">
<label>University</label>
<select id="university"></select>
</div>

<div class="field hidden" id="newUniversityField">
<label>New University Name</label>
<input type="text" id="newUniversity">
</div>

<div class="field" id="collegeWrapper">
<label>College</label>
<select id="college"></select>
</div>

<div class="field hidden" id="newCollegeField">
<label>New College Name</label>
<input type="text" id="newCollege">
</div>

<div id="contactSection" class="hidden">

<div class="field">
<label>Club Name</label>
<input type="text" id="clubName">
</div>

<div class="field">
<label>Contact Person Name</label>
<input type="text" id="contactPerson">
</div>

<div class="field">
<label>Designation</label>
<input type="text" id="designation">
</div>

<div class="field">
<label>WhatsApp Number</label>
<input type="text" id="whatsapp">
</div>

<div class="field">
<label>Email</label>
<input type="email" id="email">
</div>

<button id="submitBtn" type="submit">Submit Contact</button>

</div>

</div>

<div id="successBox" class="message success hidden">
Contact Submitted Successfully.
<br><br>
<button type="button" id="submitAnotherBtn">Submit Another</button>
</div>

<div id="message" class="message error hidden"></div>

</form>

</div>
</div>

</main>

<footer>
&copy; 2010–2026 Southeast Cultural Society | All Rights Reserved.
</footer>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbws8dqhPHcKbnoabDOvNzEdZ-_XRDiOvNrEDKl_4bZpKIeH2h6VpnsBjkTcQSZgu5VScg/exec";

let memberSelect, universitySelect, collegeSelect;

window.addEventListener("load", async () => {
await loadSystem();
document.getElementById("pageLoader").style.display = "none";
});

async function loadSystem(){
await loadData();
initSelects();
}

async function loadData(){
const res = await fetch(scriptURL + "?action=getData");
const data = await res.json();

loadDropdown("member", data.members);
loadDropdown("university", data.universities, true);
loadDropdown("college", data.colleges, true);
}

function loadDropdown(id, items, allowNew=false){
const select = document.getElementById(id);
select.innerHTML = `<option value="">Select</option>`;

items.forEach(i=>{
select.innerHTML += `<option value="${i}">${i}</option>`;
});

if(allowNew){
select.innerHTML += `<option value="__new__">+ Add New</option>`;
}
}

function initSelects(){

if(memberSelect) memberSelect.destroy();
if(universitySelect) universitySelect.destroy();
if(collegeSelect) collegeSelect.destroy();

memberSelect = new TomSelect("#member",{create:false});

universitySelect = new TomSelect("#university",{
create:false,
dropdownParent:"body",
onChange:handleUniversitySelection
});

collegeSelect = new TomSelect("#college",{
create:false,
dropdownParent:"body",
onChange:handleCollegeSelection
});

}

function handleUniversitySelection(v){
document.getElementById("newUniversityField")
.classList.toggle("hidden", v !== "__new__");

document.getElementById("collegeWrapper").style.display =
v ? "none" : "block";

toggleContact(v);
}

function handleCollegeSelection(v){
document.getElementById("newCollegeField")
.classList.toggle("hidden", v !== "__new__");

document.getElementById("universityWrapper").style.display =
v ? "none" : "block";

toggleContact(v);
}

function toggleContact(v){
if(v){
document.getElementById("contactSection").classList.remove("hidden");
}else{
document.getElementById("contactSection").classList.add("hidden");
}
}

document.getElementById("contactForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const btn = document.getElementById("submitBtn");
btn.disabled = true;
btn.innerText = "Submitting...";

const data = {
submittedBy: memberSelect.getValue(),
university: universitySelect.getValue(),
newUniversity: document.getElementById("newUniversity").value,
college: collegeSelect.getValue(),
newCollege: document.getElementById("newCollege").value,
clubName: clubName.value,
contactPerson: contactPerson.value,
designation: designation.value,
whatsapp: whatsapp.value,
email: email.value
};

const res = await fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
});

const result = await res.json();

btn.disabled = false;
btn.innerText = "Submit Contact";

if(result.success){

document.getElementById("formBox").classList.add("hidden");
document.getElementById("successBox").classList.remove("hidden");

}else{
document.getElementById("message").innerText = result.message;
document.getElementById("message").classList.remove("hidden");
}

});

/* ================= UPDATED PART ONLY ================= */
document.getElementById("submitAnotherBtn")
.addEventListener("click", async ()=>{

/* SHOW MAIN LOADER AGAIN */
const loader = document.getElementById("pageLoader");
loader.style.display = "flex";

/* reset UI */
document.getElementById("successBox").classList.add("hidden");
document.getElementById("formBox").classList.remove("hidden");
document.getElementById("message").classList.add("hidden");

/* reset form */
document.getElementById("contactForm").reset();

/* reload system */
await loadSystem();

/* reset UI states */
document.getElementById("collegeWrapper").style.display = "block";
document.getElementById("universityWrapper").style.display = "block";
document.getElementById("contactSection").classList.add("hidden");

/* hide loader again */
loader.style.display = "none";

});

</script>

</body>
</html>
